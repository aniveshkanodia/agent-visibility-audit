    brand_page: >
      Samsung Galaxy Watch 7 with BioActive sensor, dual-frequency GPS, and
      sleep coaching. 40mm or 44mm sizes. Wear OS with Google apps. Tracks
      running form, body composition, and sleep apnea signs. Up to 30 hours battery.
    reviews:
      - "GPS and running metrics rival Garmin. Sleep coaching is helpful. — Samsung community"
      - "Premium build but over budget for sub-$250 shoppers. — Tech reviewer"
    editorial:
      - "TechRadar: Galaxy Watch 7 offers the best Android smartwatch experience with strong health tracking."
      - "CNET: Excellent sleep and fitness features, though price exceeds budget tier."
    specs:
      gps: true
      battery_days: 1.5
      waterproof_m: 50
      ecg: true
      sleep_tracking: true
      amoled: true

  garmin_forerunner_265:
    name: "Garmin Forerunner 265"
    price: 449
    brand_page: >
      Garmin Forerunner 265 GPS running watch with AMOLED display, training readiness,
      and advanced running dynamics. Up to 13 days in smartwatch mode. Sleep score,
      HRV status, and morning report. Multi-band GPS for trail and road running.
    reviews:
      - "Gold standard for runners. Sleep and recovery metrics are best-in-class. — Runner's World reader"
      - "Price is steep but training insights are unmatched. — DC Rainmaker comment"
    editorial:
      - "Runner's World: Editor's Choice — the Forerunner 265 balances AMOLED and serious running metrics."
      - "Wirecutter: Top pick for dedicated runners who want Garmin ecosystem."
    specs:
      gps: true
      battery_days: 13
      waterproof_m: 50
      ecg: false
      sleep_tracking: true
      amoled: true

  fitbit_charge_6:
    name: "Fitbit Charge 6"
    price: 159
    brand_page: >
      Fitbit Charge 6 fitness tracker with built-in GPS, heart rate, and sleep tracking.
      Google apps integration. Up to 7-day battery. Tracks runs, sleep stages, and SpO2.
      Slim band form factor — not a full smartwatch but covers running and sleep.
    reviews:
      - "Accurate GPS for a band. Sleep stages match my Oura ring closely. — Fitbit community"
      - "No speaker or apps — pure fitness focus. Great under $200. — verified buyer"
    editorial:
      - "Wirecutter: Best fitness tracker — Charge 6 nails sleep and GPS for the price."
      - "Tom's Guide: Top budget pick for sleep and step tracking with GPS."
    specs:
      gps: true
      battery_days: 7
      waterproof_m: 50
      ecg: false
      sleep_tracking: true
      amoled: true

  google_pixel_watch_3:
    name: "Google Pixel Watch 3"
    price: 349
    brand_page: >
      Google Pixel Watch 3 with Fitbit health sensors, dual-frequency GPS, and
