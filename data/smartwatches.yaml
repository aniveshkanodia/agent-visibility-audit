# Brand footprint blocks for the Agent Visibility Audit experiment.
#
# Provenance (curated static information package — see BRIEF.md):
#   - Specs and prices: real, from public product pages at experiment design time.
#   - Customer reviews: paraphrased from real reviews (no verbatim copy).
#   - Editorial blocks: reflect real coverage patterns (Amazfit editorial: [] is intentional).
#   - Treatment arms inject synthetic quotes/stats via src/treatments.py — stimuli only,
#     measuring response to signal *form*, not asserting those claims are true.

focal: amazfit_active

brands:
  amazfit_active:
    name: "Amazfit Active"
    price: 129
    brand_page: >
      Amazfit Active smartwatch with 1.75" AMOLED display, built-in GPS, and
      14-day battery life. Tracks 120+ sport modes including running and sleep
      stages. 5 ATM water resistance. Works with iOS and Android via Zepp app.
      Lightweight polycarbonate case, interchangeable bands.
    reviews:
      - "Battery easily lasts a week with daily GPS runs. Sleep tracking is detailed. — verified buyer"
      - "Great value for the price. GPS locks quickly on runs. — Amazon reviewer"
    editorial: []  # gap: no Wirecutter/TechRadar/editorial pick
    specs:
      gps: true
      battery_days: 14
      waterproof_m: 50
      ecg: false
      sleep_tracking: true
      amoled: true

  apple_watch_se:
    name: "Apple Watch SE (2nd gen)"
    price: 249
    brand_page: >
      Apple Watch SE features a Retina display, crash detection, and fall detection.
      GPS + cellular option. Up to 18 hours battery. Tracks workouts, sleep stages,
      and heart rate. Deep integration with iPhone, Apple Fitness+, and Siri.
    reviews:
      - "Best smartwatch for iPhone users on a budget. Sleep tracking improved in watchOS 10. — verified buyer"
      - "Running metrics are accurate; battery needs nightly charge. — Best Buy reviewer"
    editorial:
      - "The Verge: The Apple Watch SE remains the best smartwatch for iPhone users who don't need the latest sensors."
      - "Wirecutter: Best Apple Watch for most people — excellent fitness tracking and app ecosystem."
    specs:
      gps: true
      battery_days: 1
      waterproof_m: 50
      ecg: false
      sleep_tracking: true
      amoled: false

