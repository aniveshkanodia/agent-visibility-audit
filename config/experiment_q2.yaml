# Second experiment — no price ceiling in query (q1 contrast)
focal: amazfit_active
query: "Recommend a smartwatch for running and sleep tracking."

competitors:
  - apple_watch_se
  - samsung_galaxy_watch_7
  - garmin_forerunner_265
  - fitbit_charge_6
  - google_pixel_watch_3

models:
  - id: claude-haiku-4-5
    provider: anthropic
    litellm_model: claude-haiku-4-5-20251001
  - id: gemini-3.5-flash
    provider: google
    litellm_model: gemini/gemini-3.5-flash

arms:
  - control
  - statistic
  - cite_source
  - quotation
  - problem_match
  - keyword_stuff

reps: 30
data_file: data/smartwatches.yaml
prompt_template: data/prompts/no_price_ceiling.txt
results_dir: results_q2

treatment_overrides:
  problem_match: "Built for runners who need reliable GPS pace data and detailed overnight sleep staging — "
  keyword_stuff: " Best smartwatch running sleep tracking fitness watch GPS run sleep tracker running watch sleep monitor running sleep combo."
